name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest cairosvg

      - name: Run tests
        run: pytest test_poster_utils.py test_sierpinski.py test_lorenz.py test_logistic_map.py test_generate_all.py -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t wall-tart .

      - name: Generate sample Sierpiński poster (SVG)
        run: |
          mkdir -p output
          docker run -v "$(pwd)/output:/app/output" \
            wall-tart python sierpinski_poster.py --depth 5 --output output/sierpinski_poster.svg

      - name: Generate sample Lorenz poster (SVG)
        run: |
          docker run -v "$(pwd)/output:/app/output" \
            wall-tart python lorenz_poster.py --steps 5000 --output output/lorenz_poster.svg

      - name: Generate sample Logistic Map poster (SVG)
        run: |
          docker run -v "$(pwd)/output:/app/output" \
            wall-tart python logistic_map_poster.py --r-count 200 --output output/logistic_map_poster.svg

      - name: Upload poster artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poster-svgs
          path: output/