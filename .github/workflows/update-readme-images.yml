name: Update README Images

on:
  push:
    branches: [main]
    paths:
      - "poster_utils.py"
      - "sierpinski_poster.py"
      - "lorenz_poster.py"
      - "logistic_map_poster.py"
      - "mandelbrot_poster.py"
      - "double_pendulum_poster.py"
      - "cellular_automata_poster.py"
      - "turing_patterns_poster.py"
      - "penrose_tiling_poster.py"
      - "fourier_epicycles_poster.py"
      - "harmonograph_poster.py"
      - "generate_all.py"
      - ".github/workflows/update-readme-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — write permission granted above
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate poster SVGs
        run: |
          mkdir -p docs/generated
          python sierpinski_poster.py \
            --depth 5 \
            --output docs/generated/sierpinski_poster.svg
          python lorenz_poster.py \
            --steps 10000 \
            --output docs/generated/lorenz_poster.svg
          python logistic_map_poster.py \
            --r-count 500 \
            --output docs/generated/logistic_map_poster.svg
          python mandelbrot_poster.py \
            --resolution 40 --max-iter 50 \
            --output docs/generated/mandelbrot_poster.svg
          python double_pendulum_poster.py \
            --steps 5000 \
            --output docs/generated/double_pendulum_poster.svg
          python cellular_automata_poster.py \
            --generations 80 \
            --output docs/generated/cellular_automata_poster.svg
          python turing_patterns_poster.py \
            --grid-size 30 --steps 1000 \
            --output docs/generated/turing_patterns_poster.svg
          python penrose_tiling_poster.py \
            --subdivisions 4 \
            --output docs/generated/penrose_tiling_poster.svg
          python fourier_epicycles_poster.py \
            --num-circles 20 \
            --output docs/generated/fourier_epicycles_poster.svg
          python harmonograph_poster.py \
            --steps 5000 \
            --output docs/generated/harmonograph_poster.svg

      - name: Commit updated images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/generated/sierpinski_poster.svg docs/generated/lorenz_poster.svg docs/generated/logistic_map_poster.svg docs/generated/mandelbrot_poster.svg docs/generated/double_pendulum_poster.svg docs/generated/cellular_automata_poster.svg docs/generated/turing_patterns_poster.svg docs/generated/penrose_tiling_poster.svg docs/generated/fourier_epicycles_poster.svg docs/generated/harmonograph_poster.svg
          git diff --staged --quiet && echo "No changes to commit" \
            || git commit -m "chore: regenerate poster previews [skip ci]"
          git push
