name: Update README Images

on:
  push:
    branches: [main]
    paths:
      - "sierpinski_poster.py"
      - "lorenz_poster.py"
      - "logistic_map_poster.py"
      - ".github/workflows/update-readme-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — write permission granted above
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate poster SVGs
        run: |
          mkdir -p docs/generated
          python sierpinski_poster.py \
            --depth 5 \
            --output docs/generated/sierpinski_poster.svg
          python lorenz_poster.py \
            --steps 10000 \
            --output docs/generated/lorenz_poster.svg
          python logistic_map_poster.py \
            --r-count 500 \
            --output docs/generated/logistic_map_poster.svg

      - name: Commit updated images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/generated/sierpinski_poster.svg docs/generated/lorenz_poster.svg docs/generated/logistic_map_poster.svg
          git diff --staged --quiet && echo "No changes to commit" \
            || git commit -m "chore: regenerate poster previews [skip ci]"
          git push
